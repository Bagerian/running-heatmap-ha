name: "Running Heatmap"
description: "Generate interactive running heatmaps from your Strava export and/or intervals.icu data"
version: "1.0.13"
slug: "running_heatmap"
init: false

arch:
  - aarch64
  - amd64

homeassistant_api: false
ingress: true
ingress_port: 8000
panel_icon: "mdi:map-marker-path"
panel_title: "Running Heatmap"

options:
  intervals_icu_api_key: ""
  intervals_icu_athlete_id: ""
  stadia_api_key: ""
  home_lat: 0.0
  home_lon: 0.0
  radius_km: 0

schema:
  intervals_icu_api_key: str?
  intervals_icu_athlete_id: str?
  stadia_api_key: str?
  home_lat: float?
  home_lon: float?
  radius_km: int?

ports:
  8000/tcp: 8000

ports_description:
  8000/tcp: "Heatmap viewer"

map:
  - share:rw

webui: "http://[HOST]:[PORT:8000]/heatmap.html"
